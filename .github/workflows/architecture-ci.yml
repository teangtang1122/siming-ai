name: Architecture CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/check-architecture.py"
      - ".jscpd.json"
      - ".github/workflows/architecture-ci.yml"
  push:
    branches: [main, "codex/3.0-architecture"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/check-architecture.py"
      - ".jscpd.json"
      - ".github/workflows/architecture-ci.yml"

jobs:
  contracts:
    runs-on: ubuntu-latest
    env:
      MOSHU_DISABLE_AUTO_MCP_SETUP: "1"
      SIMING_ENABLE_LOCAL_RUNTIME: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate backend boundaries
        working-directory: backend
        run: python scripts/run_quality.py

      - name: Validate frontend boundaries and generated API
        working-directory: frontend
        run: npm run quality
