name: Release Gate

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate, for example v2.7.13
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-smoke:
    if: github.event_name != 'release'
    runs-on: windows-latest
    env:
      MOSHU_DISABLE_AUTO_MCP_SETUP: "1"
      SIMING_ENABLE_LOCAL_RUNTIME: "0"
      OPENAI_API_KEY: test-placeholder
      ANTHROPIC_API_KEY: test-placeholder
      ARK_API_KEY: test-placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          $frontendVersion = (Get-Content frontend/package.json -Raw | ConvertFrom-Json).version
          $backendVersion = (Select-String -Path backend/app/version.py -Pattern 'APP_VERSION\s*=\s*["'']([^"'']+)' | Select-Object -First 1).Matches.Groups[1].Value
          if ($tag -ne "v$frontendVersion" -or $frontendVersion -ne $backendVersion) {
            throw "Tag $tag must match frontend/backend version ($frontendVersion/$backendVersion)."
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm test
          npm run build
          npx playwright install chromium
          npm run test:e2e

      - name: Install backend test dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Validate backend
        working-directory: backend
        run: python ../scripts/run-backend-tests-isolated.py tests

      - name: Build distributable
        shell: cmd
        run: build-exe.bat

      - name: Verify package assets and run smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}".TrimStart("v")
          ./scripts/verify-release-assets.ps1 -ReleaseDir release -ExpectedVersion $version
          ./scripts/smoke-test-release.ps1 -SkipBuild

      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            release/Siming.exe
            release/update.json
            release/sha256.txt
          if-no-files-found: error

      - name: Upload release diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            frontend/test-results
            frontend/playwright-report
            .build
          if-no-files-found: ignore

  verify-published-assets:
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and verify published assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart("v")
          New-Item -ItemType Directory -Force -Path release | Out-Null
          gh release download $tag -R "${{ github.repository }}" -p "Siming.exe" -p "update.json" -p "sha256.txt" -D release
          ./scripts/verify-release-assets.ps1 -ReleaseDir release -ExpectedVersion $version
