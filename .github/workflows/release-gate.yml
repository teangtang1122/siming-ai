name: Release Gate

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate, for example v2.7.13
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-smoke:
    if: github.event_name != 'release'
    runs-on: windows-latest
    env:
      MOSHU_DISABLE_AUTO_MCP_SETUP: "1"
      SIMING_ENABLE_LOCAL_RUNTIME: "0"
      OPENAI_API_KEY: test-placeholder
      ANTHROPIC_API_KEY: test-placeholder
      ARK_API_KEY: test-placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          git fetch --tags --force
          $headCommit = (git rev-parse HEAD).Trim()
          $tagCommit = (git rev-list -n 1 $tag).Trim()
          if (-not $tagCommit -or $headCommit -ne $tagCommit) {
            throw "Release validation must build the exact tag commit. HEAD=$headCommit tag=$tagCommit"
          }
          $frontendVersion = (Get-Content frontend/package.json -Raw | ConvertFrom-Json).version
          $backendVersion = (Select-String -Path backend/app/version.py -Pattern 'APP_VERSION\s*=\s*["'']([^"'']+)' | Select-Object -First 1).Matches.Groups[1].Value
          if ($tag -ne "v$frontendVersion" -or $frontendVersion -ne $backendVersion) {
            throw "Tag $tag must match frontend/backend version ($frontendVersion/$backendVersion)."
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm test
          npm run architecture
          npm run duplicates
          npm run build
          npx playwright install chromium
          npm run test:e2e

      - name: Install backend test dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate backend
        working-directory: backend
        run: |
          python scripts/run_quality.py
          python ../scripts/run-backend-tests-isolated.py tests

      - name: Validate generated API types
        working-directory: frontend
        run: npm run api:check

      - name: Build distributable
        shell: cmd
        run: build-exe.bat

      - name: Verify package assets and run smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}".TrimStart("v")
          ./scripts/verify-release-assets.ps1 -ReleaseDir release -ExpectedVersion $version
          ./scripts/smoke-test-release.ps1 -SkipBuild

      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            release/Siming.exe
            release/update.json
            release/sha256.txt
          if-no-files-found: error

      - name: Upload release diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            frontend/test-results
            frontend/playwright-report
            .build
          if-no-files-found: ignore

  verify-published-assets:
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and verify published assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart("v")
          $expectedAssets = @("Siming.exe", "update.json", "sha256.txt")
          $verified = $false
          New-Item -ItemType Directory -Force -Path release | Out-Null
          for ($attempt = 1; $attempt -le 18; $attempt++) {
            $release = gh release view $tag -R "${{ github.repository }}" --json assets | ConvertFrom-Json
            $availableAssets = @($release.assets | ForEach-Object { $_.name })
            $missingAssets = @($expectedAssets | Where-Object { $_ -notin $availableAssets })
            if ($missingAssets.Count -gt 0) {
              Write-Host "Waiting for published assets ($attempt/18): $($missingAssets -join ', ')"
              Start-Sleep -Seconds 10
              continue
            }
            try {
              gh release download $tag -R "${{ github.repository }}" -p "Siming.exe" -p "update.json" -p "sha256.txt" -D release --clobber
              if ($LASTEXITCODE -ne 0) { throw "gh release download failed with exit code $LASTEXITCODE" }
              ./scripts/verify-release-assets.ps1 -ReleaseDir release -ExpectedVersion $version
              $verified = $true
              break
            } catch {
              Write-Host "Published asset verification attempt $attempt/18 failed: $($_.Exception.Message)"
              Start-Sleep -Seconds 10
            }
          }
          if (-not $verified) { throw "Published release assets were not available or did not verify after 18 attempts." }
